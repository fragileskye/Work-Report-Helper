<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Audit Pro v9.1 - Master</title>
    <style id="root-vars">
        :root { 
            --urgent: #ff4d4f; --primary: #1a73e8; --success: #52c41a; --warning: #faad14; --text: #2c3e50;
            --global-fs: 18px; --border-size: 2px; --card-padding: 30px; --ui-width: 1350px;
        }
        body { font-family: 'Segoe UI', system-ui; background: #f0f3f6; margin: 0; padding: 20px; color: var(--text); font-size: var(--global-fs); overflow-x: hidden; }
        .container { width: var(--ui-width); margin: auto; position: relative; }
        
        /* 侧边拖拽手柄 */
        .resizer-bar { position: fixed; right: 0; top: 0; width: 10px; height: 100vh; background: #ddd; cursor: ew-resize; opacity: 0; transition: opacity 0.3s; z-index: 10000; }
        .resizer-bar:hover { opacity: 1; background: var(--primary); }

        .nav-bar { display: flex; gap: 30px; margin-bottom: 30px; border-bottom: var(--border-size) solid #cbd5e0; padding-bottom: 15px; }
        .nav-link { cursor: pointer; font-weight: bold; color: #94a3b8; transition: 0.2s; }
        .nav-link.active { color: var(--primary); border-bottom: var(--border-size) solid var(--primary); }
        
        .panel { background: white; padding: var(--card-padding); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; border: var(--border-size) solid #e2e8f0; }
        .init-grid { display: grid; grid-template-columns: 180px 1fr 1fr 1fr 1fr auto; gap: 15px; align-items: end; }
        input, select, button, textarea { padding: 12px; border: var(--border-size) solid #cbd5e0; border-radius: 8px; font-size: inherit; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* Batch Card */
        .batch-card { background: white; border-radius: 16px; margin-bottom: 35px; border-top: 8px solid #64748b; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: var(--border-size) solid #e2e8f0; }
        .batch-card.is-posted { opacity: 0.6; filter: grayscale(0.5); }
        .batch-header { padding: 20px 25px; background: #f8fafc; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: var(--border-size) solid #e2e8f0; border-radius: 16px 16px 0 0; }
        
        /* Invoice Table */
        .inv-row { display: grid; grid-template-columns: 100px 160px 220px 200px 420px 1fr 50px; gap: 15px; padding: 18px 25px; border-bottom: var(--border-size) solid #f1f5f9; align-items: center; }
        .editable { cursor: pointer; border-bottom: 1px dashed #94a3b8; border-radius: 4px; padding: 2px 4px; }
        .editable:hover { background: #eff6ff; color: var(--primary); }
        .font-mono { font-family: 'Consolas', monospace; font-weight: bold; }
        
        .steps { display: flex; flex-direction: column; gap: 6px; font-size: 0.8em; font-weight: bold; color: #64748b; }
        .steps label { display: flex; align-items: center; gap: 10px; cursor: pointer; white-space: nowrap; }
        .steps input { width: 18px; height: 18px; }

        .amt-display { text-align: right; font-family: 'Consolas', monospace; font-weight: bold; font-size: 1.1em; }
        .badge { padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-left: 10px; color: white; }

        .comment-box { width: 100%; margin-top: 10px; background: #fff; border: 1px dashed #cbd5e0; padding: 10px; font-style: italic; border-radius: 6px; }
        .alert-box { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 8px solid var(--urgent); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="resizer" class="resizer-bar"></div>

<div class="container" id="main-container">
    <div class="nav-bar">
        <span class="nav-link active" onclick="route('main', this)">DASHBOARD</span>
        <span class="nav-link" onclick="route('settings', this)">SETTINGS & STYLER</span>
    </div>

    <div id="global-alerts"></div>

    <div id="page-main">
        <div class="panel">
            <div class="init-grid">
                <div><label>Batch ID</label><div style="display:flex; align-items:center; background:#edf2f7; border-radius:8px; border:var(--border-size) solid #cbd5e0; overflow:hidden;"><span style="padding:0 12px; font-weight:bold">OL</span><input type="text" id="in-id" style="border:none; background:transparent" placeholder="0000"></div></div>
                <div><label>Category</label><select id="in-cat" onchange="checkB()"></select></div>
                <div><label>Type (I/E)</label><select id="in-type"></select></div>
                <div><label>Period</label><input type="month" id="in-period"></div>
                <div><label>Value Date</label><input type="date" id="in-due"></div>
                <button class="btn-action" style="padding: 12px 30px" onclick="initBatch()">INITIALIZE</button>
            </div>
        </div>
        <div id="draw-list"></div>
    </div>

    <div id="page-settings" class="hidden">
        <div class="panel">
            <h3>🎨 VISUAL STYLER</h3>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                <div><label>Global Font Size (px)</label><input type="number" id="st-fs" onchange="syncUI()"></div>
                <div><label>Border Weight (px)</label><input type="number" id="st-bs" onchange="syncUI()"></div>
                <div><label>Dashboard Width (px)</label><input type="number" id="st-wd" onchange="syncUI()"></div>
            </div>
        </div>
        <div class="panel">
            <h3>⚙️ SYSTEM CONFIG</h3>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-bottom:20px;">
                <input type="number" id="cfg-threshold" placeholder="Threshold">
                <div><input type="text" id="cfg-catA" placeholder="A"><input type="text" id="cfg-catB" placeholder="B"><input type="text" id="cfg-catC" placeholder="C"></div>
                <div><input type="text" id="cfg-typeP" placeholder="Pay"><input type="text" id="cfg-typeR" placeholder="Rec"></div>
            </div>
            <label>Entity Rules (CODE:Vendor Name)</label>
            <textarea id="cfg-rules" style="width:100%; height:150px; font-family:monospace; margin-top:10px;"></textarea>
            <button class="btn-action" style="margin-top:20px" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>
    </div>
</div>

<script>
    // --- State Management ---
    let app = {
        batches: JSON.parse(localStorage.getItem('aud_v91_batches')) || [],
        threshold: parseFloat(localStorage.getItem('aud_v91_threshold')) || 10000,
        config: JSON.parse(localStorage.getItem('aud_v91_config')) || { catA:"HK", catB:"Cycle", catC:"Admin", typeP:"Payment", typeR:"Receipt" },
        styles: JSON.parse(localStorage.getItem('aud_v91_styles')) || { fs: 18, bs: 2, wd: 1350 },
        entities: JSON.parse(localStorage.getItem('aud_v91_entities')) || {"ABC": "ABC Company"}
    };

    function commit() {
        localStorage.setItem('aud_v91_batches', JSON.stringify(app.batches));
        localStorage.setItem('aud_v91_threshold', app.threshold);
        localStorage.setItem('aud_v91_config', JSON.stringify(app.config));
        localStorage.setItem('aud_v91_entities', JSON.stringify(app.entities));
        localStorage.setItem('aud_v91_styles', JSON.stringify(app.styles));
        render();
    }

    // --- Routing ---
    function route(page, el) {
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('page-main').classList.toggle('hidden', page !== 'main');
        document.getElementById('page-settings').classList.toggle('hidden', page !== 'settings');
        if(page === 'main') { buildDrops(); render(); }
        else { loadSettings(); }
    }

    function checkB() {
        const cat = document.getElementById('in-cat').value;
        const p = document.getElementById('in-period');
        p.disabled = (cat === 'B');
        if(p.disabled) p.value = "";
    }

    function buildDrops() {
        document.getElementById('in-cat').innerHTML = `<option value="A">${app.config.catA}</option><option value="B">${app.config.catB}</option><option value="C">${app.config.catC}</option>`;
        document.getElementById('in-type').innerHTML = `<option value="Payment">${app.config.typeP}</option><option value="Receipt">${app.config.typeR}</option>`;
        checkB();
    }

    // --- Core Actions ---
    function initBatch() {
        const id = document.getElementById('in-id').value;
        const cat = document.getElementById('in-cat').value;
        const due = document.getElementById('in-due').value;
        const period = document.getElementById('in-period').value;
        if(!id || !due || (cat!=='B' && !period)) return alert("Incomplete Batch Data!");

        const catName = cat==='A'?app.config.catA : (cat==='B'?app.config.catB:app.config.catC);
        const typeName = document.getElementById('in-type').value === 'Payment' ? app.config.typeP : app.config.typeR;

        app.batches.push({
            uid: Date.now() + Math.random(),
            idOnly: id,
            title: `OL ${id} ${catName} ${typeName}`,
            cat, type: document.getElementById('in-type').value, 
            due, period,
            invoices: [], isPosted: false, comment: ""
        });
        commit();
    }

    function addInv(bUid) {
        const b = app.batches.find(x => x.uid === bUid);
        if(b.isPosted) return;
        
        const entity = prompt("Entity Code:").toUpperCase();
        if(!entity) return;
        const ctr = prompt("Ctr No:");
        const sup = prompt("Supplier Name:");
        const amt = parseFloat(prompt("Amount:") || 0);
        const vd = prompt("Value Date (VD):", b.due);
        const rm = (b.cat !== 'B') ? prompt("Receipt Month (YYYY-MM):") : null;

        b.invoices.push({
            uid: Date.now() + Math.random(),
            entity, ctr, supplier: sup, amount: amt, vd, rm,
            steps: [false, false, false], comment: ""
        });
        commit();
    }

    function postBatch(bUid) {
        const b = app.batches.find(x => x.uid === bUid);
        if(b.isPosted) {
            b.isPosted = false;
            commit();
            return;
        }
        const ready = b.invoices.length > 0 && b.invoices.every(i => i.steps[2] === true);
        if(!ready) return alert("ERROR: Cannot Post! All invoices must be APPROVED first.");
        b.isPosted = true;
        commit();
    }

    function editBatch(bUid, key, cur) {
        const b = app.batches.find(x => x.uid === bUid);
        if(b.isPosted) return;
        let val = prompt(`Edit Batch ${key}:`, cur);
        if(val !== null) {
            b[key] = val;
            const catName = b.cat==='A'?app.config.catA : (b.cat==='B'?app.config.catB:app.config.catC);
            const typeName = b.type==='Payment'?app.config.typeP:app.config.typeR;
            b.title = `OL ${b.idOnly} ${catName} ${typeName}`;
            commit();
        }
    }

    function editInv(bUid, iUid, key, cur) {
        const b = app.batches.find(x => x.uid === bUid);
        const i = b.invoices.find(x => x.uid === iUid);
        if(b.isPosted) return;
        let val = prompt(`Edit Invoice ${key}:`, cur);
        if(val !== null) {
            if(key==='amount') val = parseFloat(val)||0;
            i[key] = (key==='entity') ? val.toUpperCase() : val;
            commit();
        }
    }

    // --- UI Rendering ---
    function render() {
        // Sort
        app.batches.sort((a,b) => (a.isPosted === b.isPosted) ? new Date(a.due) - new Date(b.due) : (a.isPosted ? 1 : -1));

        // Global Alert
        const aZone = document.getElementById('global-alerts'); aZone.innerHTML = "";
        const dailyPay = {};
        app.batches.forEach(b => {
            if(!b.isPosted && b.type === 'Payment') {
                dailyPay[b.due] = (dailyPay[b.due] || 0) + b.invoices.reduce((s,i)=>s+i.amount,0);
            }
        });
        Object.keys(dailyPay).filter(d => dailyPay[d] > app.threshold).forEach(d => {
            aZone.innerHTML += `<div class="alert-box">⚠️ VOLUME ALERT: ${d} | Total $${dailyPay[d].toLocaleString()} exceeds Daily Threshold.</div>`;
        });

        // Batches
        const bList = document.getElementById('draw-list'); bList.innerHTML = "";
        const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];

        app.batches.forEach(b => {
            const batchSum = b.invoices.reduce((s,i)=>s+i.amount,0);
            const vdMismatch = b.invoices.some(i => i.vd !== b.due);
            
            let html = `
            <div class="batch-card ${b.isPosted?'is-posted':''}" style="border-top-color: ${b.isPosted?'#ccc':(b.type==='Payment'?'#cf1322':'#389e0d')}">
                <div class="batch-header">
                    <div>
                        <strong class="editable" onclick="editBatch(${b.uid}, 'idOnly', '${b.idOnly}')">${b.title}</strong>
                        ${vdMismatch ? '<span class="badge" style="background:var(--warning)">VD MISMATCH</span>' : ''}
                        ${b.due === tomorrow && !b.isPosted ? '<span class="badge" style="background:var(--urgent)">DUE TOMORROW</span>' : ''}
                        <div style="font-size:0.8em; color:#64748b; margin-top:5px;">Value Date: ${b.due} | Period: ${b.period || 'N/A'}</div>
                        <textarea class="comment-box" onchange="const b=app.batches.find(x=>x.uid===${b.uid}); b.comment=this.value; commit()" placeholder="Batch Notes...">${b.comment || ''}</textarea>
                    </div>
                    <div style="text-align:right">
                        <div class="amt-display" style="font-size:1.5em">$${batchSum.toLocaleString()}</div>
                        <div style="margin: 15px 0;">
                            <button class="btn-action" onclick="addInv(${b.uid})" ${b.isPosted?'disabled':''}>ADD INVOICE</button>
                            <button class="btn-action" style="background:${b.isPosted?'#64748b':'#0f172a'}; margin-left:10px" onclick="postBatch(${b.uid})">${b.isPosted?'RELEASE':'POST BATCH'}</button>
                        </div>
                        <button style="border:none; background:none; color:#94a3b8; cursor:pointer; font-size:12px" onclick="if(confirm('Delete Batch?')){app.batches=app.batches.filter(x=>x.uid!==${b.uid});commit()}">DELETE BATCH</button>
                    </div>
                </div>
                <div>`;

            b.invoices.forEach(i => {
                const iVdm = i.vd !== b.due;
                const vendorName = app.entities[i.entity] || `Unmapped (${i.entity})`;
                html += `
                <div class="inv-row" style="${iVdm ? 'background:#fffbeb;' : ''}">
                    <div class="font-mono editable" onclick="editInv(${b.uid},${i.uid},'entity','${i.entity}')">${i.entity}</div>
                    <div class="font-mono editable" onclick="editInv(${b.uid},${i.uid},'ctr','${i.ctr}')">${i.ctr}</div>
                    <div class="editable" style="font-weight:bold" onclick="editInv(${b.uid},${i.uid},'supplier','${i.supplier}')">${i.supplier}
                        <textarea class="comment-box" style="font-size:11px; min-height:30px" onchange="const b=app.batches.find(x=>x.uid===${b.uid}); const i=b.invoices.find(x=>x.uid===${i.uid}); i.comment=this.value; commit()" placeholder="Invoice notes...">${i.comment || ''}</textarea>
                    </div>
                    <div style="font-size:0.8em; color:var(--primary); font-weight:600">${vendorName}</div>
                    <div class="steps">
                        <label><input type="checkbox" ${i.steps[0]?'checked':''} onclick="const b=app.batches.find(x=>x.uid===${b.uid}); const i=b.invoices.find(x=>x.uid===${i.uid}); i.steps[0]=!i.steps[0]; commit()" ${b.isPosted?'disabled':''}> CREATED</label>
                        <label><input type="checkbox" ${i.steps[1]?'checked':''} onclick="const b=app.batches.find(x=>x.uid===${b.uid}); const i=b.invoices.find(x=>x.uid===${i.uid}); i.steps[1]=!i.steps[1]; commit()" ${b.isPosted?'disabled':''}> SENT</label>
                        <label><input type="checkbox" ${i.steps[2]?'checked':''} onclick="const b=app.batches.find(x=>x.uid===${b.uid}); const i=b.invoices.find(x=>x.uid===${i.uid}); i.steps[2]=!i.steps[2]; commit()" ${b.isPosted?'disabled':''}> APPROVED</label>
                    </div>
                    <div class="amt-display ${i.amount>=0?'amt-pos':'amt-neg'}" onclick="editInv(${b.uid},${i.uid},'amount','${i.amount}')">
                        $${i.amount.toLocaleString()}
                        <div style="font-size:0.7em; color:${iVdm?'#b91c1c':'#64748b'}; font-weight:normal">VD: ${i.vd} ${i.rm?'| M: '+i.rm:''}</div>
                    </div>
                    <button style="border:none; background:none; color:#cbd5e0; cursor:pointer; font-size:20px" onclick="if(confirm('Delete Inv?')){const b=app.batches.find(x=>x.uid===${b.uid}); b.invoices=b.invoices.filter(x=>x.uid!==${i.uid}); commit()}">✕</button>
                </div>`;
            });
            html += `</div></div>`;
            bList.innerHTML += html;
        });
    }

    // --- Settings & UI Control ---
    function loadSettings() {
        document.getElementById('st-fs').value = app.styles.fs;
        document.getElementById('st-bs').value = app.styles.bs;
        document.getElementById('st-wd').value = app.styles.wd;
        document.getElementById('cfg-threshold').value = app.threshold;
        document.getElementById('cfg-catA').value = app.config.catA;
        document.getElementById('cfg-catB').value = app.config.catB;
        document.getElementById('cfg-catC').value = app.config.catC;
        document.getElementById('cfg-typeP').value = app.config.typeP;
        document.getElementById('cfg-typeR').value = app.config.typeR;
        let t = ""; for(let k in app.entities) t += `${k}:${app.entities[k]}\n`;
        document.getElementById('cfg-rules').value = t.trim();
    }

    function saveSettings() {
        app.threshold = parseFloat(document.getElementById('cfg-threshold').value);
        app.config = {
            catA: document.getElementById('cfg-catA').value, catB: document.getElementById('cfg-catB').value, catC: document.getElementById('cfg-catC').value,
            typeP: document.getElementById('cfg-typeP').value, typeR: document.getElementById('cfg-typeR').value
        };
        const rules = document.getElementById('cfg-rules').value.split('\n');
        app.entities = {};
        rules.forEach(l => { const p = l.split(':'); if(p.length===2) app.entities[p[0].trim().toUpperCase()] = p[1].trim(); });
        
        app.styles.fs = document.getElementById('st-fs').value;
        app.styles.bs = document.getElementById('st-bs').value;
        app.styles.wd = document.getElementById('st-wd').value;
        
        syncUI();
        commit();
        alert("Configuration Synchronized.");
        route('main', document.querySelector('.nav-link'));
    }

    function syncUI() {
        const r = document.documentElement;
        r.style.setProperty('--global-fs', app.styles.fs + 'px');
        r.style.setProperty('--border-size', app.styles.bs + 'px');
        r.style.setProperty('--ui-width', app.styles.wd + 'px');
    }

    // --- Drag Resizer Handle ---
    const handle = document.getElementById('resizer');
    let isDragging = false;
    handle.addEventListener('mousedown', () => { isDragging = true; document.body.style.cursor = 'ew-resize'; });
    window.addEventListener('mousemove', (e) => {
        if(!isDrag
