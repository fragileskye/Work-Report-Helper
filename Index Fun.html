<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Audit Pro v9.4</title>
    <style>
        :root { 
            --urgent: #ff4d4f; --primary: #1a73e8; --success: #52c41a; --warning: #faad14; --text: #2c3e50;
            --global-fs: 18px; --border-size: 2px; --card-padding: 30px; --ui-width: 1350px;
        }
        body { font-family: 'Segoe UI', system-ui; background: #f0f3f6; margin: 0; padding: 20px; color: var(--text); font-size: var(--global-fs); margin-bottom: 100px; }
        .container { width: var(--ui-width); margin: auto; position: relative; }
        
        .resizer-bar { position: fixed; right: 0; top: 0; width: 10px; height: 100vh; background: #ddd; cursor: ew-resize; opacity: 0.3; z-index: 10000; }
        .resizer-bar:hover { opacity: 1; background: var(--primary); }

        .nav-bar { display: flex; gap: 30px; margin-bottom: 30px; border-bottom: var(--border-size) solid #cbd5e0; padding-bottom: 15px; align-items: center; }
        .nav-link { cursor: pointer; font-weight: bold; color: #94a3b8; transition: 0.2s; }
        .nav-link.active { color: var(--primary); border-bottom: var(--border-size) solid var(--primary); }
        
        .live-stat { margin-left: auto; font-size: 0.8em; background: #e2e8f0; padding: 5px 15px; border-radius: 20px; font-weight: bold; color: #475569; }

        /* 新增：右下角计分板 */
        .scoreboard { position: fixed; bottom: 20px; right: 20px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: var(--border-size) solid #e2e8f0; border-radius: 15px; padding: 15px 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); z-index: 9999; display: flex; gap: 25px; transition: transform 0.3s; }
        .scoreboard:hover { transform: translateY(-5px); }
        .score-item { display: flex; flex-direction: column; }
        .score-label { font-size: 11px; font-weight: bold; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .score-val { font-family: 'Consolas', monospace; font-weight: bold; font-size: 1.1em; margin-top: 4px; }

        .panel { background: white; padding: var(--card-padding); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; border: var(--border-size) solid #e2e8f0; }
        .init-grid { display: grid; grid-template-columns: 180px 1fr 1fr 1fr 1fr auto; gap: 15px; align-items: end; }
        input, select, button, textarea { padding: 12px; border: var(--border-size) solid #cbd5e0; border-radius: 8px; font-size: inherit; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .batch-card { background: white; border-radius: 16px; margin-bottom: 35px; border-top: 8px solid #64748b; border: var(--border-size) solid #e2e8f0; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .batch-card.is-posted { opacity: 0.6; filter: grayscale(0.5); }
        .batch-header { padding: 20px 25px; background: #f8fafc; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: var(--border-size) solid #e2e8f0; border-radius: 16px 16px 0 0; }
        
        .inv-row { display: grid; grid-template-columns: 100px 160px 220px 200px 420px 1fr 50px; gap: 15px; padding: 18px 25px; border-bottom: var(--border-size) solid #f1f5f9; align-items: center; }
        .editable { cursor: pointer; border-bottom: 1px dashed #94a3b8; padding: 2px 4px; }
        .editable:hover { background: #eff6ff; color: var(--primary); }
        
        .steps { display: flex; flex-direction: column; gap: 6px; font-size: 0.8em; font-weight: bold; color: #64748b; }
        .steps label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .steps input { width: 18px; height: 18px; }

        .amt-display { text-align: right; font-family: 'Consolas', monospace; font-weight: bold; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-left: 10px; color: white; }
        
        .alert-box { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 8px solid var(--urgent); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .btn-dismiss { background: #fff; border: 1px solid #fecaca; color: #b91c1c; padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="resizer" class="resizer-bar"></div>

<div id="scoreboard" class="scoreboard">
    <div class="score-item">
        <div class="score-label" id="sb-label-paid">Cumulative Paid</div>
        <div class="score-val" id="sb-val-paid" style="color:var(--urgent)">$0</div>
    </div>
    <div class="score-item" style="border-left: 1px solid #eee; padding-left: 20px;">
        <div class="score-label" id="sb-label-rec">Cumulative Received</div>
        <div class="score-val" id="sb-val-rec" style="color:var(--success)">$0</div>
    </div>
    <div class="score-item" style="border-left: 1px solid #eee; padding-left: 20px;">
        <div class="score-label" id="sb-label-pend">The Debt (Pending)</div>
        <div class="score-val" id="sb-val-pend" style="color:var(--primary)">$0</div>
    </div>
</div>

<div class="container" id="main-container">
    <div class="nav-bar">
        <span id="nav-main" class="nav-link active" onclick="route('main')">DASHBOARD</span>
        <span id="nav-settings" class="nav-link" onclick="route('settings')">SETTINGS</span>
        <div id="live-stat" class="live-stat">Today's VD Pending: $0</div>
    </div>

    <div id="global-alerts"></div>

    <div id="page-main">
        <div class="panel">
            <div class="init-grid">
                <div><label>Batch ID</label><div style="display:flex; align-items:center; background:#edf2f7; border-radius:8px; border:var(--border-size) solid #cbd5e0; overflow:hidden;"><span style="padding:0 12px; font-weight:bold">OL</span><input type="text" id="in-id" placeholder="0000" style="border:none; background:transparent"></div></div>
                <div><label>Category</label><select id="in-cat" onchange="checkB()"></select></div>
                <div><label>Type (I/E)</label><select id="in-type"></select></div>
                <div><label>Period</label><input type="month" id="in-period"></div>
                <div><label>Value Date</label><input type="date" id="in-due"></div>
                <button class="btn-action" onclick="initBatch()">INITIALIZE</button>
            </div>
        </div>
        <div id="batch-list-draw"></div>
    </div>

    <div id="page-settings" class="hidden">
        <div class="panel">
            <h3>🎨 VISUAL STYLER</h3>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px;">
                <div><label>Font Size</label><input type="number" id="st-fs" onchange="syncUI()"></div>
                <div><label>Border Weight</label><input type="number" id="st-bs" onchange="syncUI()"></div>
                <div><label>Width (px)</label><input type="number" id="st-wd" onchange="syncUI()"></div>
            </div>
        </div>
        <div class="panel">
            <h3>⚙️ SYSTEM CONFIG</h3>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-bottom:20px;">
                <div><label>Threshold</label><input type="number" id="cfg-threshold"></div>
                <div><label>Cat Names</label><input type="text" id="cfg-catA"><input type="text" id="cfg-catB"><input type="text" id="cfg-catC"></div>
                <div><label>Type Labels</label><input type="text" id="cfg-typeP"><input type="text" id="cfg-typeR"></div>
            </div>
            <label>Entity Rules (ABC:Company Name)</label>
            <textarea id="cfg-rules" style="width:100%; height:150px; font-family:monospace; margin-top:10px;"></textarea>
            <button class="btn-action" onclick="saveSettings()">SAVE SETTINGS</button>
        </div>
    </div>
</div>

<script>
    // --- Data Persistence ---
    let app = {
        batches: JSON.parse(localStorage.getItem('aud_v94_batches')) || [],
        threshold: parseFloat(localStorage.getItem('aud_v94_threshold')) || 10000,
        config: JSON.parse(localStorage.getItem('aud_v94_config')) || { catA:"HK", catB:"Cycle", catC:"Admin", typeP:"Payment", typeR:"Receipt" },
        styles: JSON.parse(localStorage.getItem('aud_v94_styles')) || { fs: 18, bs: 2, wd: 1350 },
        entities: JSON.parse(localStorage.getItem('aud_v94_entities')) || {"ABC": "Example Co"},
        dismissed: JSON.parse(localStorage.getItem('aud_v94_dismissed')) || []
    };

    function commit() {
        localStorage.setItem('aud_v94_batches', JSON.stringify(app.batches));
        localStorage.setItem('aud_v94_threshold', app.threshold);
        localStorage.setItem('aud_v94_config', JSON.stringify(app.config));
        localStorage.setItem('aud_v94_entities', JSON.stringify(app.entities));
        localStorage.setItem('aud_v94_styles', JSON.stringify(app.styles));
        localStorage.setItem('aud_v94_dismissed', JSON.stringify(app.dismissed));
        render();
    }

    function route(p) {
        document.getElementById('nav-main').classList.toggle('active', p==='main');
        document.getElementById('nav-settings').classList.toggle('active', p==='settings');
        document.getElementById('page-main').classList.toggle('hidden', p!=='main');
        document.getElementById('page-settings').classList.toggle('hidden', p!=='settings');
        if(p==='main') render(); else loadSettingsUI();
    }

    // --- Core Logic ---
    function isPast(d) { const today = new Date(); today.setHours(0,0,0,0); return new Date(d + "T00:00:00") < today; }

    function checkB() {
        const c = document.getElementById('in-cat').value;
        const p = document.getElementById('in-period');
        p.disabled = (c==='B'); if(p.disabled) p.value="";
    }

    function buildDrops() {
        document.getElementById('in-cat').innerHTML = `<option value="A">${app.config.catA}</option><option value="B">${app.config.catB}</option><option value="C">${app.config.catC}</option>`;
        document.getElementById('in-type').innerHTML = `<option value="Payment">${app.config.typeP}</option><option value="Receipt">${app.config.typeR}</option>`;
        document.getElementById('in-period').min = new Date().toISOString().substring(0, 7);
        checkB();
    }

    function initBatch() {
        const id = document.getElementById('in-id').value;
        const cat = document.getElementById('in-cat').value;
        const due = document.getElementById('in-due').value;
        const per = document.getElementById('in-period').value;
        if(!id || !due || (cat!=='B' && !per)) return alert("Data Missing");
        if(isPast(due) && !confirm("Past Date. Confirm?")) return;

        app.batches.push({
            uid: "b"+Date.now(), idOnly: id,
            title: `OL ${id} ${cat==='A'?app.config.catA:(cat==='B'?app.config.catB:app.config.catC)} ${document.getElementById('in-type').value==='Payment'?app.config.typeP:app.config.typeR}`,
            cat, type: document.getElementById('in-type').value, due, period: per,
            invoices: [], isPosted: false, comment: ""
        });
        commit();
    }

    function addInv(bUid) {
        const b = app.batches.find(x=>x.uid===bUid);
        const ent = (prompt("Entity Code:")||"").toUpperCase(); if(!ent) return;
        const ctr = prompt("Ctr No:"); const sup = prompt("Supplier:");
        const amt = parseFloat(prompt("Amount:")||0); const vd = prompt("VD:", b.due);
        if(vd && isPast(vd) && !confirm("Past Date. Proceed?")) return;
        const rm = (b.cat!=='B')?prompt("Receipt Month:"):null;
        b.invoices.push({ uid:"i"+Date.now()+Math.floor(Math.random()*1000), entity:ent, ctr, supplier:sup, amount:amt, vd, rm, steps:[false,false,false], comment:"" });
        commit();
    }

    function postBatch(bUid) {
        const b = app.batches.find(x=>x.uid===bUid);
        if(b.isPosted) { b.isPosted=false; commit(); return; }
        if(b.invoices.length>0 && b.invoices.every(i=>i.steps[2])) { b.isPosted=true; commit(); } 
        else alert("Need Approvals!");
    }

    function editBatch(bUid, k, cur) {
        const b = app.batches.find(x=>x.uid===bUid); if(b.isPosted) return;
        let v = prompt(`Edit ${k}:`, cur); if(v!==null) {
            if(k==='due'&&isPast(v)&&!confirm("Past Date. Confirm?")) return;
            b[k]=v; commit();
        }
    }

    function editInv(bUid, iUid, k, cur) {
        const b = app.batches.find(x=>x.uid===bUid); const i = b.invoices.find(x=>x.uid===iUid);
        if(b.isPosted) return;
        let v = prompt(`Edit ${k}:`, cur); if(v!==null) {
            if(k==='amount') v=parseFloat(v)||0;
            if(k==='vd'&&isPast(v)&&!confirm("Past Date?")) return;
            i[k]=(k==='entity')?v.toUpperCase():v; commit();
        }
    }

    // --- Rendering ---
    function render() {
        app.batches.sort((a,b) => (a.isPosted===b.isPosted)? new Date(a.due)-new Date(b.due) : (a.isPosted?1:-1));

        // Scoreboard & Alert Logic
        let totalPaid=0, totalRec=0, totalPend=0, vdPending=0;
        const alerts = document.getElementById('global-alerts'); alerts.innerHTML="";
        const daily={};
        const todayStr = new Date().toISOString().split('T')[0];

        app.batches.forEach(b => {
            const bSum = b.invoices.reduce((s,i)=>s+i.amount,0);
            if(b.isPosted) {
                if(b.type==='Payment') totalPaid += bSum; else totalRec += bSum;
            } else {
                if(b.type==='Payment') {
                    totalPend += bSum;
                    daily[b.due] = (daily[b.due]||0)+bSum;
                    if(b.due === todayStr) vdPending += bSum;
                }
            }
        });

        // Update Scoreboard
        document.getElementById('sb-label-paid').innerText = `Cumulative ${app.config.typeP}`;
        document.getElementById('sb-val-paid').innerText = `$${totalPaid.toLocaleString()}`;
        document.getElementById('sb-label-rec').innerText = `Cumulative ${app.config.typeR}`;
        document.getElementById('sb-val-rec').innerText = `$${totalRec.toLocaleString()}`;
        document.getElementById('sb-val-pend').innerText = `$${totalPend.toLocaleString()}`;
        document.getElementById('live-stat').innerText = `Today's VD Pending: $${vdPending.toLocaleString()}`;

        Object.keys(daily).filter(d=>daily[d]>app.threshold).forEach(d => {
            if(!app.dismissed.includes(d)) {
                alerts.innerHTML += `<div class="alert-box"><span>⚠️ ${d}: $${daily[d].toLocaleString()} > Threshold</span><button class="btn-dismiss" onclick="app.dismissed.push('${d}');commit()">I've notified Finance</button></div>`;
            }
        });

        const list = document.getElementById('batch-list-draw'); list.innerHTML="";
        app.batches.forEach(b => {
            const sum = b.invoices.reduce((s,i)=>s+i.amount,0);
            let h = `
            <div class="batch-card ${b.isPosted?'is-posted':''}" style="border-top-color:${b.isPosted?'#ccc':(b.type==='Payment'?'#cf1322':'#389e0d')}">
                <div class="batch-header">
                    <div>
                        <strong class="editable" onclick="editBatch('${b.uid}','idOnly','${b.idOnly}')">${b.title}</strong>
                        <div style="font-size:0.8em; color:#64748b; margin-top:5px;">Due: ${b.due} | Period: ${b.period||'N/A'}</div>
                        <textarea class="comment-box" onchange="app.batches.find(x=>x.uid==='${b.uid}').comment=this.value;commit()" placeholder="Batch Notes">${b.comment}</textarea>
                    </div>
                    <div style="text-align:right">
                        <div class="amt-display" style="font-size:1.4em">$${sum.toLocaleString()}</div>
                        <div style="margin:15px 0;"><button class="btn-action" style="width:auto;padding:10px 20px" onclick="addInv('${b.uid}')" ${b.isPosted?'disabled':''}>Add Invoice</button><button class="btn-action" style="width:auto;padding:10px 20px;background:${b.isPosted?'#64748b':'#0f172a'};margin-left:10px" onclick="postBatch('${b.uid}')">${b.isPosted?'RELEASE':'POST BATCH'}</button></div>
                        <button style="border:none;background:none;color:#94a3b8;cursor:pointer;font-size:12px" onclick="if(confirm('Delete?')){app.batches=app.batches.filter(x=>x.uid!=='${b.uid}');commit()}">Delete Batch</button>
                    </div>
                </div>
                <div>`;
            b.invoices.forEach(i => {
                h += `<div class="inv-row" style="${i.vd!==b.due?'background:#fffbeb':''}">
                    <div class="editable font-sync" onclick="editInv('${b.uid}','${i.uid}','entity','${i.entity}')">${i.entity}</div>
                    <div class="editable font-sync" onclick="editInv('${b.uid}','${i.uid}','ctr','${i.ctr}')">${i.ctr}</div>
                    <div class="editable" style="font-weight:bold" onclick="editInv('${b.uid}','${i.uid}','supplier','${i.supplier}')">${i.supplier}<textarea class="comment-box" style="font-size:11px;min-height:30px" onchange="app.batches.find(x=>x.uid==='${b.uid}').invoices.find(y=>y.uid==='${i.uid}').comment=this.value;commit()">${i.comment}</textarea></div>
                    <div style="font-size:0.8em;color:var(--primary);font-weight:600">${app.entities[i.entity]||'Unmapped'}</div>
                    <div class="steps">${['Created','Sent','Approved'].map((s,idx)=>`<label><input type="checkbox" ${i.steps[idx]?'checked':''} onclick="app.batches.find(x=>x.uid==='${b.uid}').invoices.find(y=>y.uid==='${i.uid}').steps[${idx}]=!this.checked;commit()" ${b.isPosted?'disabled':''}> ${s}</label>`).join('')}</div>
                    <div class="amt-display ${i.amount>=0?'amt-pos':'amt-neg'}" onclick="editInv('${b.uid}','${i.uid}','amount','${i.amount}')">$${i.amount.toLocaleString()}<div style="font-size:0.7em;color:#64748b;font-weight:normal">VD: ${i.vd} ${i.rm?'| M: '+i.rm:''}</div></div>
                    <button style="border:none;background:none;color:#cbd5e0;cursor:pointer;font-size:20px" onclick="if(confirm('Del?')){const b=app.batches.find(x=>x.uid==='${b.uid}');b.invoices=b.invoices.filter(y=>y.uid!=='${i.uid}');commit()}">✕</button>
                </div>`;
            });
            h += `</div></div>`; list.innerHTML += h;
        });
    }

    function loadSettingsUI() {
        document.getElementById('st-fs').value=app.styles.fs; document.getElementById('st-bs').value=app.styles.bs; document.getElementById('st-wd').value=app.styles.wd;
        document.getElementById('cfg-threshold').value=app.threshold; document.getElementById('cfg-catA').value=app.config.catA; document.getElementById('cfg-catB').value=app.config.catB; document.getElementById('cfg-catC').value=app.config.catC;
        document.getElementById('cfg-typeP').value=app.config.typeP; document.getElementById('cfg-typeR').value=app.config.typeR;
        let t=""; for(let k in app.entities) t+=`${k}:${app.entities[k]}\n`; document.getElementById('cfg-rules').value=t.trim();
    }

    function saveSettings() {
        app.threshold=parseFloat(document.getElementById('cfg-threshold').value);
        app.config={catA:document.getElementById('cfg-catA').value,catB:document.getElementById('cfg-catB').value,catC:document.getElementById('cfg-catC').value,typeP:document.getElementById('cfg-typeP').value,typeR:document.getElementById('cfg-typeR').value};
        const r=document.getElementById('cfg-rules').value.split('\n'); app.entities={};
        r.forEach(l=>{const p=l.split(':'); if(p.length===2) app.entities[p[0].trim().toUpperCase()]=p[1].trim();});
        app.styles={fs:document.getElementById('st-fs').value,bs:document.getElementB
